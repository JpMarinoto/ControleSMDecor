# Trecho nginx — homologação Shopee em /homolog/
# Incluir DENTRO do server { ... } de santosmarinoto.com (antes do location /).
#
# URL pública:
#   https://santosmarinoto.com/homolog/
#   https://santosmarinoto.com/homolog/api/shopee/oauth/callback/
#
# No Console Shopee (domínio de teste):
#   https://santosmarinoto.com

location /homolog/api/ {
    proxy_pass http://127.0.0.1:8001/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}

location /homolog/assets/ {
    proxy_pass http://127.0.0.1:8001/assets/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /homolog/logo/ {
    proxy_pass http://127.0.0.1:8001/logo/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location /homolog/ {
    proxy_pass http://127.0.0.1:8001/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
}
