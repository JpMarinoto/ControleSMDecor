{% extends 'base.html' %}

{% block content %}
<div class="container bg-white p-4 shadow-sm rounded">
    <h3>
        <i class="bi bi-plus-circle"></i>
        {% if produto %}Editar Produto{% else %}Cadastrar Produto{% endif %}
    </h3>
    <hr>
    <form method="POST">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Nome do Produto</label>
                <input type="text" name="nome" class="form-control" placeholder="Ex: Painel Ripado Freijó 1.20m"
                       value="{{ produto.nome|default_if_none:'' }}" required>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Categoria</label>
                <select name="categoria" class="form-select" required>
                    <option value="">Selecione...</option>
                    {% for categoria in categorias %}
                        <option value="{{ categoria.id }}"
                                {% if produto.categoria.id == categoria.id %}selected{% endif %}>
                            {{ categoria.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Preço de Venda Inicial (R$)</label>
                <input type="number" step="0.01" name="preco_venda" class="form-control" placeholder="0.00"
                       value="{{ produto.preco_venda|default_if_none:'' }}" required>
            </div>
        </div>
        <div class="mt-3">
            <button type="submit" class="btn btn-primary px-5">Salvar Produto</button>
            <a href="{% url 'lista_produtos' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
