{% extends 'base.html' %}

{% block content %}
<div class="container bg-white p-4 shadow-sm rounded">
    <h3>Registar Compra / Despesa</h3>
    <hr>
    <form method="POST" class="mt-3">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Fornecedor</label>
                <select name="fornecedor" class="form-select" required>
                    <option value="">Selecione o Fornecedor...</option>
                    {% for f in fornecedores %}
                    <option value="{{ f.id }}">{{ f.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Valor da Compra (R$)</label>
                <input type="number" step="0.01" name="valor" class="form-control" placeholder="0.00" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold">Descrição do Material</label>
            <input type="text" name="descricao" class="form-control" placeholder="Ex: 10 Rolos de Fita Dupla-face" required>
        </div>
        
        <div class="mt-4">
            <button type="submit" class="btn btn-danger px-5">Lançar Despesa</button>
            <a href="{% url 'lista_fornecedores' %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
