{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'financeiro/css/tabelas.css' %}">
</head>
<body class="bg-light p-4">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Contas a Receber</h2>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">Voltar ao Dashboard</a>
    </div>

    <table class="tabela-clientes">
        <thead>
            <tr>
                <th>Cliente</th>
                <th>Telefone</th>
                <th>Saldo Devedor</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for cliente in clientes %}
            <tr class="{% if cliente.saldo_devedor > 10000 %}devedor-alto{% endif %}">
                <td><a href="{% url 'detalhe_cliente' cliente.id %}">{{ cliente.nome }}</a></td>
                <td>{{ cliente.telefone|default:"---" }}</td>
                <td>
                    <span class="badge-divida {% if cliente.saldo_devedor > 0 %}bg-danger{% else %}bg-success{% endif %} text-white">
                        R$ {{ cliente.saldo_devedor|floatformat:2 }}
                    </span>
                </td>
                <td>
                    <a href="{% url 'gerir_caixa' %}" class="btn btn-sm btn-primary">Registar Pagamento</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
</body>
</html>
