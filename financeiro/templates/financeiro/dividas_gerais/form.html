{% extends 'base.html' %}

{% block content %}
<div class="container bg-white p-4 shadow-sm rounded">
    <h3><i class="bi bi-credit-card"></i> {% if divida %}Editar dívida{% else %}Nova dívida geral{% endif %}</h3>
    <p class="text-muted">Ex.: Aluguel, Funcionários, Governo.</p>
    <hr>
    <form method="post">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Nome</label>
                <input type="text" name="nome" class="form-control" value="{% if divida %}{{ divida.nome }}{% endif %}" placeholder="Ex.: Aluguel" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Valor (R$)</label>
                <input type="number" step="0.01" name="valor" class="form-control" value="{% if divida %}{{ divida.valor|floatformat:2 }}{% endif %}" required>
            </div>
        </div>
        <button type="submit" class="btn btn-warning">Salvar</button>
        <a href="{% url 'lista_dividas_gerais' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
