{% extends 'base.html' %}

{% block content %}
<div class="container bg-white p-4 shadow-sm rounded">
    <h3><i class="bi bi-cash-stack"></i> Nova saída</h3>
    <p class="text-muted">Registre uma saída com descrição e valor (ex.: fita dupla face R$ 10,00).</p>
    <hr>

    <form method="post" class="mt-3">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-5 mb-3">
                <label class="form-label fw-bold">Descrição</label>
                <input type="text" name="descricao" class="form-control" placeholder="Ex.: Fita dupla face" required>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Valor (R$)</label>
                <input type="number" step="0.01" name="valor" class="form-control" placeholder="0,00" required>
            </div>
        </div>
        <button type="submit" class="btn btn-danger">Registrar saída</button>
        <a href="{% url 'lista_movimentacoes' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
