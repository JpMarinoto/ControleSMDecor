{% extends 'base.html' %}

{% block content %}
<div class="container bg-white p-4 shadow-sm rounded">
    <h3><i class="bi bi-cart-plus"></i> Registrar Compra de Material</h3>
    <hr>
    
    <form method="POST">
        {% csrf_token %}
        <div class="row mb-3">
            <div class="col-md-6">
                <label class="form-label fw-bold">Fornecedor</label>
                <select name="fornecedor" id="id_fornecedor" class="form-select" required>
                    <option value="">Selecione o fornecedor...</option>
                    {% for f in fornecedores %}
                    <option value="{{ f.id }}">{{ f.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-6">
                <label class="form-label fw-bold">Material</label>
                <select name="material" id="id_material" class="form-select" required>
                    <option value="">Selecione o material...</option>
                    {% for m in materiais %}
                    <option value="{{ m.id }}">{{ m.nome }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <label class="form-label fw-bold">Quantidade</label>
                <input type="number" name="quantidade" class="form-control" min="1" required>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-bold">Custo Unitário (R$)</label>
                <input type="number" step="0.01" name="preco" id="id_preco" class="form-control" placeholder="0.00" required>
                <div id="aviso-preco" class="form-text text-info" style="display:none;">
                    <i class="bi bi-info-circle"></i> Preço sugerido da última compra.
                </div>
            </div>
            <div class="col-md-4 d-flex align-items-end">
                <button type="submit" class="btn btn-danger w-100">Finalizar Compra</button>
            </div>
        </div>
    </form>
</div>

<script>
function atualizarPreco() {
    const fornecedorId = document.getElementById('id_fornecedor').value;
    const materialId = document.getElementById('id_material').value;
    const campoPreco = document.getElementById('id_preco');
    const aviso = document.getElementById('aviso-preco');

    if (fornecedorId && materialId) {
        fetch(`/api/buscar-ultimo-custo/?material_id=${materialId}&fornecedor_id=${fornecedorId}`)
            .then(response => response.json())
            .then(data => {
                if (data.sucesso) {
                    campoPreco.value = data.preco;
                    aviso.style.display = 'block';
                }
            });
    }
}

// Escuta mudanças nos dois campos
document.getElementById('id_fornecedor').addEventListener('change', atualizarPreco);
document.getElementById('id_material').addEventListener('change', atualizarPreco);
</script>
{% endblock %}
