{% extends 'base.html' %}

{% block content %}
<div class="container bg-white p-4 shadow-sm rounded">
    <h3>
        {% if fornecedor %}Editar Fornecedor{% else %}Registar Novo Fornecedor{% endif %}
    </h3>
    <form method="POST" class="mt-3">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Nome / Razão Social</label>
                <input type="text" name="nome" class="form-control"
                       value="{{ fornecedor.nome|default_if_none:'' }}" required>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">CPF</label>
                <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00"
                       value="{{ fornecedor.cpf|default_if_none:'' }}">
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label">CNPJ</label>
                <input type="text" name="cnpj" class="form-control" placeholder="00.000.000/0000-00"
                       value="{{ fornecedor.cnpj|default_if_none:'' }}">
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Telefone</label>
                <input type="text" name="telefone" class="form-control"
                       value="{{ fornecedor.telefone|default_if_none:'' }}">
            </div>
        </div>
        <button type="submit" class="btn btn-success">Salvar Fornecedor</button>
        <a href="{% url 'lista_fornecedores' %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
