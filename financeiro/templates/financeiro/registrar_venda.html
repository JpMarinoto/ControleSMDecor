{% load static %}
<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'financeiro/css/venda.css' %}">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="venda-container shadow">
        <h2>Registar Nova Venda</h2>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-4">
                <label>Selecione o Cliente</label>
                <select name="cliente" id="id_cliente" class="form-select" required>
                    <option value="">--- Selecione ---</option>
                    {% for c in clientes %}
                    <option value="{{ c.id }}">{{ c.nome }}</option>
                    {% endfor %}
                </select>
            </div>

            <div id="itens-container">
                <h5>Itens do Pedido</h5>
                <div class="row item-row">
                    <div class="col-md-5">
                        <select name="variacao[]" class="form-select select-variacao" required>
                            <option value="">Produto / Cor</option>
                            {% for v in variacoes %}
                            <option value="{{ v.id }}">{{ v.produto_pai.nome }} - {{ v.cor }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <input type="number" name="quantidade[]" class="form-control" placeholder="Quant" required>
                    </div>
                    <div class="col-md-3">
                        <input type="number" step="0.01" name="preco[]" class="form-control input-preco" placeholder="Preço Un." required>
                    </div>
                </div>
            </div>

            <button type="button" id="add-item" class="btn btn-add mt-3">+ Adicionar Produto</button>
            <button type="submit" class="btn btn-save mt-3">Finalizar Venda</button>
        </form>
    </div>
</div>

<script>
// Lógica para adicionar linhas e buscar preço automático
document.getElementById('add-item').addEventListener('click', function() {
    let container = document.getElementById('itens-container');
    let row = container.querySelector('.item-row').cloneNode(true);
    row.querySelectorAll('input').forEach(i => i.value = '');
    container.appendChild(row);
});

document.addEventListener('change', function(e) {
    if (e.target.classList.contains('select-variacao')) {
        let clienteId = document.getElementById('id_cliente').value;
        let variacaoId = e.target.value;
        let precoInput = e.target.closest('.item-row').querySelector('.input-preco');

        if (clienteId && variacaoId) {
            fetch(`/api/ultimo-preco/?cliente_id=${clienteId}&variacao_id=${variacaoId}`)
                .then(response => response.json())
                .then(data => {
                    precoInput.value = data.preco;
                });
        }
    }
});
</script>
</body>
</html>
