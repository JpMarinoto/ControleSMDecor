{% extends 'base.html' %}

{% block content %}
<div class="container bg-white p-4 shadow-sm rounded">
    <h3>
        <i class="bi bi-hammer"></i>
        {% if material %}Editar Material{% else %}Cadastrar Material{% endif %}
    </h3>
    <hr>

    <form method="POST" class="mt-3">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Nome do Material</label>
                <input type="text" name="nome" class="form-control"
                       value="{{ material.nome|default_if_none:'' }}" required>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Categoria de Material</label>
                <select name="categoria" class="form-select">
                    <option value="">Selecione...</option>
                    {% for c in categorias %}
                        <option value="{{ c.id }}"
                                {% if material and material.categoria_id == c.id %}selected{% endif %}>
                            {{ c.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Fornecedor Padrão</label>
                <select name="fornecedor" class="form-select">
                    <option value="">Selecione...</option>
                    {% for f in fornecedores %}
                        <option value="{{ f.id }}"
                                {% if material and material.fornecedor_padrao_id == f.id %}selected{% endif %}>
                            {{ f.nome }}
                        </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Preço Unitário Base (R$)</label>
                <input type="number" step="0.01" name="preco" class="form-control"
                       value="{{ material.preco_unitario_base|default_if_none:'' }}">
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label fw-bold">Estoque Atual</label>
                <input type="number" name="estoque_atual" class="form-control"
                       value="{{ material.estoque_atual|default_if_none:'' }}">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="{% url 'lista_materiais' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
