{% extends 'base.html' %}

{% block content %}
<div class="container bg-white p-4 shadow-sm rounded">
    <h3><i class="bi bi-wallet2"></i> {% if item %}Editar{% else %}Adicionar outros a receber{% endif %}</h3>
    <p class="text-muted">Ex.: Valor a cair do e-commerce, marketplace.</p>
    <hr>
    <form method="post">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Descrição</label>
                <input type="text" name="descricao" class="form-control" value="{% if item %}{{ item.descricao }}{% endif %}" placeholder="Ex.: E-commerce" required>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Valor (R$)</label>
                <input type="number" step="0.01" name="valor" class="form-control" value="{% if item %}{{ item.valor|floatformat:2 }}{% endif %}" required>
            </div>
            <div class="col-md-3 mb-3">
                <label class="form-label fw-bold">Data prevista (opcional)</label>
                <input type="date" name="data_prevista" class="form-control" value="{% if item and item.data_prevista %}{{ item.data_prevista|date:'Y-m-d' }}{% endif %}">
            </div>
        </div>
        <button type="submit" class="btn btn-success">Salvar</button>
        <a href="{% url 'lista_outros_a_receber' %}" class="btn btn-outline-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
